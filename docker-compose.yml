services:
  backend:
    build:
      context: ./backend
    container_name: liber-trade-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug --access-log
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2-vision}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: liber-trade-frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  frontend_node_modules:
